services:
  env-dashboard:
    image: "mcr.microsoft.com/dotnet/nightly/aspire-dashboard:latest"
    environment:
      ASPIRE_DASHBOARD_FORWARDEDHEADERS_ENABLED: "true"
    ports:
      - "8181:18888"
    expose:
      - "18889"
      - "18890"
    networks:
      - "aspire"
    restart: "always"
  db:
    image: "docker.io/library/postgres:17.6"
    environment:
      POSTGRES_HOST_AUTH_METHOD: "scram-sha-256"
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256 --auth-local=scram-sha-256"
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "${DB_PASSWORD}"
    expose:
      - "5432"
    volumes:
      - type: "volume"
        target: "/var/lib/postgresql/data"
        source: "picketdb_volume"
        read_only: false
    networks:
      - "aspire"
  cache:
    image: "docker.io/library/redis:8.6"
    command:
      - "-c"
      - "redis-server --requirepass $$REDIS_PASSWORD"
    entrypoint:
      - "/bin/sh"
    environment:
      REDIS_PASSWORD: "${CACHE_PASSWORD}"
    expose:
      - "6379"
    networks:
      - "aspire"
  piketapi:
    image: "${PIKETAPI_IMAGE}"
    environment:
      OTEL_DOTNET_EXPERIMENTAL_OTLP_RETRY: "in_memory"
      ASPNETCORE_FORWARDEDHEADERS_ENABLED: "true"
      HTTP_PORTS: "${PIKETAPI_PORT}"
      ConnectionStrings__cache: "cache:6379,password=${CACHE_PASSWORD}"
      CACHE_HOST: "cache"
      CACHE_PORT: "6379"
      CACHE_PASSWORD: "${CACHE_PASSWORD}"
      CACHE_URI: "redis://:${CACHE_PASSWORD}@cache:6379"
      ConnectionStrings__piketdb: "Host=db;Port=5432;Username=postgres;Password=${DB_PASSWORD};Database=piketdb"
      PIKETDB_HOST: "db"
      PIKETDB_PORT: "5432"
      PIKETDB_USERNAME: "postgres"
      PIKETDB_PASSWORD: "${DB_PASSWORD}"
      PIKETDB_URI: "postgresql://postgres:${DB_PASSWORD}@db:5432/piketdb"
      PIKETDB_JDBCCONNECTIONSTRING: "jdbc:postgresql://db:5432/piketdb"
      PIKETDB_DATABASENAME: "piketdb"
      JWT_SECRET: "O0ywQA1xv4h1EXL4cnsQ4ReHEoqwMuejtXB4KxOeTCB4nOpV4yVegegbEgtzsZWfl5wlBWBY5kpUPVsEmkVr3V9sxvOPmT4YR3PvUCiw7s1xMrSoCMVqnG7VlSeO469Z"
      JWT_ISSUER: "https://localhost:5001"
      JWT_AUDIENCE: "https://localhost:5001"
      DEFAULT_PASSWORD: "Password@123"
      PIKETAPI_PORT: "5001"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://env-dashboard:18889"
      OTEL_EXPORTER_OTLP_PROTOCOL: "grpc"
      OTEL_SERVICE_NAME: "piketapi"
    ports:
      - "${PIKETAPI_PORT}"
    expose:
      - "8000"
    depends_on:
      db:
        condition: "service_started"
      cache:
        condition: "service_started"
    networks:
      - "aspire"
  admin-client:
    image: "${ADMIN_CLIENT_IMAGE}"
    environment:
      NODE_ENV: "production"
      PORT: "8001"
      PIKETAPI_HTTP: "http://piketapi:${PIKETAPI_PORT}"
      services__piketapi__http__0: "http://piketapi:${PIKETAPI_PORT}"
      PIKETAPI_HTTPS: "https://piketapi:${PIKETAPI_PORT}"
      PIKETAPI_TCP: "tcp://piketapi:8000"
      services__piketapi__tcp__0: "tcp://piketapi:8000"
      VITE_API_URL: "http://piketapi:${PIKETAPI_PORT}"
      VITE_LOGO: "/smk.png"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://env-dashboard:18889"
      OTEL_EXPORTER_OTLP_PROTOCOL: "grpc"
      OTEL_SERVICE_NAME: "admin-client"
    ports:
      - "8001"
    depends_on:
      piketapi:
        condition: "service_started"
    networks:
      - "aspire"
networks:
  aspire:
    driver: "bridge"
volumes:
  picketdb_volume:
    driver: "local"
