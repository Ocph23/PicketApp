version: "3.8"

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgrespassword123}
      POSTGRES_DB: ${POSTGRES_DB:-piketdb}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  cache:
    image: redis:7
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:-redispassword123}

  piketapi:
    build:
      context: .
      dockerfile: PiketWebApi/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:${PIKETAPI_PORT:-5001}
      ASPNETCORE_HTTP_PORTS: "${PIKETAPI_PORT:-5001}"
      ConnectionStrings__piketdb: "Host=db;Port=5432;Username=postgres;Password=${POSTGRES_PASSWORD:-postgrespassword123};Database=${POSTGRES_DB:-piketdb}"
      ConnectionStrings__cache: "redis,password=${REDIS_PASSWORD:-redispassword123}"
      JWT_SECRET: ${JWT_SECRET:-change-this-to-a-long-random-secret}
      JWT_ISSUER: ${JWT_ISSUER:-http://localhost:${PIKETAPI_PORT:-5001}}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-https://localhost:${PIKETAPI_PORT:-5001}}
      DEFAULT_PASSWORD: "Password@123"
    ports:
      - "${PIKETAPI_PORT:-5001}:${PIKETAPI_PORT:-5001}"
    depends_on:
      - db
      - cache

  admin-client:
    build:
      context: ./smkn8picket-client
      dockerfile: Dockerfile
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:${PIKETAPI_PORT:-5001}/api}
      VITE_LOGO: ${VITE_LOGO:-/smk.png}
    ports:
      - "${ADMIN_CLIENT_PORT:-8000}:80"
    depends_on:
      - piketapi

  whatsapp:
    build:
      context: ./WhatsApp
      dockerfile: ./Dockerfile
    environment:
      NODE_ENV: production
      WWEBJS_AUTH_PATH: /usr/src/app/.wwebjs_auth
      DATABASE_URL: postgresql://postgres:password123@db:5432/piketdb
    depends_on:
      - db
    ports:
      - 3000:3000
    volumes:
      - whatsapp_auth:/usr/src/app/.wwebjs_auth

volumes:
  postgres_data:
  whatsapp_auth:
