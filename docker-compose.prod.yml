version: "3.8"

services:
  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
      POSTGRES_DB: ${POSTGRES_DB:-piketdb}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-piketdb}",
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  cache:
    image: redis:7
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:-change-me}"]
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-change-me}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  piketapi:
    image: ${PIKETAPI_IMAGE:?set PIKETAPI_IMAGE}
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:5001
      ASPNETCORE_HTTP_PORTS: "5001"
      ConnectionStrings__piketdb: Host=db;Port=5432;Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-change-me};Database=${POSTGRES_DB:-piketdb};GSS Encryption Mode=Disable
      ConnectionStrings__cache: cache,password=${REDIS_PASSWORD:-change-me}
      JWT_SECRET: ${JWT_SECRET:-change-me}
      JWT_ISSUER: ${JWT_ISSUER:-http://localhost:5001}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-http://localhost:5001}
      DEFAULT_PASSWORD: ${DEFAULT_PASSWORD:-Password@123}
    ports:
      - "${PIKETAPI_PORT:-5001}:5001"
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy

  admin-client:
    image: ${ADMIN_CLIENT_IMAGE:?set ADMIN_CLIENT_IMAGE}
    restart: unless-stopped
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://${PUBLIC_DOMAIN:-localhost}}
      VITE_LOGO: ${VITE_LOGO:-/smk.png}
    depends_on:
      piketapi:
        condition: service_started

  whatsapp:
    image: ${WHATSAPP_IMAGE:?set WHATSAPP_IMAGE}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      WWEBJS_AUTH_PATH: /usr/src/app/.wwebjs_auth
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-change-me}@db:5432/${POSTGRES_DB:-piketdb}
    ports:
      - "3000:3000"
    volumes:
      - whatsapp_auth:/usr/src/app/.wwebjs_auth
    depends_on:
      db:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - admin-client
      - piketapi
      - whatsapp
    ports:
      - "80:3001"
    volumes:
      - ./nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  postgres_data:
  whatsapp_auth:
